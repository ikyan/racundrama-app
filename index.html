<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Racun Drama VIP</title>
    <style>
        /* Bumbu Dasar Biar Kayak Aplikasi Pro */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Header VIP */
        .header {
            padding: 15px;
            text-align: center;
            background-color: #1a1a1a;
            font-weight: bold;
            font-size: 1.2em;
            border-bottom: 2px solid #e50914;
        }

        /* Player Video Nempel di Atas */
        .video-container {
            width: 100%;
            background-color: #000;
            position: sticky;
            top: 0;
            z-index: 999;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        }
        
        video {
            width: 100%;
            height: auto;
            max-height: 30vh; /* Biar gak menuhin layar banget pas portrait */
            outline: none;
            display: block;
        }

        /* Info Judul Drakor */
        .info-container {
            padding: 15px;
        }
        .judul-drama {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 5px;
            line-height: 1.4;
        }
        .status-vip {
            font-size: 0.8em;
            color: #aaa;
            background: #333;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
        }

        /* List Episode */
        .episode-list {
            padding: 0 15px 20px 15px;
        }
        .episode-btn {
            display: block;
            width: 100%;
            padding: 14px;
            margin-bottom: 10px;
            background-color: #2a2a2a;
            color: white;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            text-align: left;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .episode-btn:active {
            transform: scale(0.98);
        }
        /* Warna kalau episode lagi diputar */
        .episode-btn.sedang-diputar {
            background-color: #e50914;
            border-color: #e50914;
        }
    </style>
</head>
<body>

    <div class="header">👑 Racun Drama VIP</div>

    <div class="video-container">
        <video id="videoPlayer" controls playsinline>
            <source id="videoSource" src="" type="video/mp4">
            Browser lo gak support video bro.
        </video>
    </div>

    <div class="info-container">
        <div class="status-vip">Pilihan VIP</div>
        <div class="judul-drama" id="teksJudul">Memuat Drama...</div>
    </div>

    <div class="episode-list" id="daftarEpisode">
        </div>

    <script>
        // PASTIIN LINK INI BENER KE REPO GITHUB LO YA BRO
        const linkKatalog = 'https://raw.githubusercontent.com/ikyan/racundrama-app/main/katalog.json';

        const videoPlayer = document.getElementById('videoPlayer');
        const videoSource = document.getElementById('videoSource');
        const teksJudul = document.getElementById('teksJudul');
        const daftarEpisode = document.getElementById('daftarEpisode');

        async function ambilData() {
            try {
                // Sedot data dari katalog.json
                const respon = await fetch(linkKatalog);
                const data = await respon.json();
                
                // Ambil data drama urutan pertama
                const drakor = data[0];
                teksJudul.innerText = drakor.judul;

                // Looping bikin tombol buat tiap episode
                drakor.episodes.forEach((eps, index) => {
                    const tombol = document.createElement('button');
                    tombol.className = 'episode-btn';
                    tombol.innerText = "▶ " + eps.nama;
                    
                    // Kalau tombol diklik, lakuin ini:
                    tombol.onclick = () => {
                        // 1. Matiin warna merah di semua tombol
                        document.querySelectorAll('.episode-btn').forEach(btn => btn.classList.remove('sedang-diputar'));
                        // 2. Nyalain warna merah di tombol yg diklik
                        tombol.classList.add('sedang-diputar');
                        
                        // 3. Ganti link video & Play
                        videoSource.src = eps.link;
                        videoPlayer.load();
                        videoPlayer.play();
                    };

                    // Masukin tombolnya ke layar
                    daftarEpisode.appendChild(tombol);

                    // Otomatis putar episode 1 pas pertama kali app dibuka
                    if(index === 0) {
                        tombol.click();
                        // Pause dikit biar gak kaget lgsg bunyi pas buka app
                        setTimeout(() => videoPlayer.pause(), 100); 
                    }
                });

            } catch (error) {
                teksJudul.innerText = "Gagal memuat video bro!";
                console.error("Error ngambil katalog:", error);
            }
        }

        // Jalankan mesinnya
        ambilData();
    </script>
</body>
</html>
