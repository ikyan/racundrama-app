<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racun Drama VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #141414; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        header { background-color: #000; padding: 15px; text-align: center; border-bottom: 2px solid #E50914; position: sticky; top: 0; z-index: 100; }
        h1 { margin: 0; font-size: 20px; color: #E50914; text-transform: uppercase; letter-spacing: 2px; }
        .container { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; }
        .card { background-color: #222; border-radius: 8px; overflow: hidden; transition: 0.3s; border: 1px solid #333; }
        .poster { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
        .info { padding: 8px; text-align: center; }
        .title { font-size: 12px; font-weight: bold; margin-bottom: 8px; height: 34px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        .btn-view { background-color: #E50914; color: white; border: none; padding: 6px; border-radius: 4px; width: 100%; font-size: 11px; font-weight: bold; cursor: pointer; }

        /* Modal Overlay */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; overflow-y: auto; }
        .modal-content { padding: 20px; text-align: center; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-close { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 20px; }
        .episode-list { display: flex; flex-direction: column; gap: 10px; }
        .episode-item { background: #222; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #444; text-decoration: none; color: white; }
        .episode-item:active { background: #E50914; }
    </style>
</head>
<body>
    <header><h1>🎬 RACUN DRAMA VIP</h1></header>
    <div class="container" id="katalog-container"></div>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title" style="font-size: 18px; color: #E50914;">Pilih Episode</h2>
                <button class="btn-close" onclick="closeModal()">Tutup</button>
            </div>
            <div id="episode-list" class="episode-list"></div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let allData = [];

        fetch('katalog.json?v=' + Date.now())
            .then(res => res.json())
            .then(data => {
                allData = data;
                const container = document.getElementById('katalog-container');
                data.forEach((drama, index) => {
                    container.innerHTML += `
                        <div class="card" onclick="showEpisodes(${index})">
                            <img src="${drama.poster}" class="poster">
                            <div class="info">
                                <div class="title">${drama.judul}</div>
                                <button class="btn-view">LIHAT EPISODE</button>
                            </div>
                        </div>
                    `;
                });
            });

        function showEpisodes(index) {
            const drama = allData[index];
            document.getElementById('modal-title').innerText = drama.judul;
            const list = document.getElementById('episode-list');
            list.innerHTML = "";
            
            drama.episodes.forEach(ep => {
                list.innerHTML += `
                    <a href="${ep.link}" class="episode-item">
                        <span>${ep.nama}</span>
                        <span style="color: #E50914;">▶ PLAY</span>
                    </a>
                `;
            });
            document.getElementById('modal').style.display = "block";
        }

        function closeModal() { document.getElementById('modal').style.display = "none"; }
    </script>
</body>
</html>
