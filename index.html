<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racun Drama VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background-color: #141414; color: white; font-family: Arial, sans-serif; margin: 0; padding: 0; }
        header { background-color: #000000; padding: 15px; text-align: center; border-bottom: 2px solid #E50914; }
        h1 { margin: 0; font-size: 24px; color: #E50914; }
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .card { background-color: #222; border-radius: 8px; overflow: hidden; text-align: center; }
        .poster { width: 100%; height: 200px; object-fit: cover; }
        .info { padding: 10px; }
        .title { font-size: 14px; font-weight: bold; margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-nonton { background-color: #E50914; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
    </style>
</head>
<body>
    <header><h1>🎬 Racun Drama VIP</h1></header>
    
    <div class="container" id="katalog-container"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function bukaVideo(linkTelegram) { tg.openTelegramLink(linkTelegram); }

        // Narik data otomatis dari file katalog.json yang dikirim Colab
        fetch('katalog.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('katalog-container');
                data.forEach(drama => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${drama.poster}" alt="Poster" class="poster">
                        <div class="info">
                            <div class="title">${drama.judul}</div>
                            <button class="btn-nonton" onclick="bukaVideo('${drama.link_nonton}')">Nonton VIP</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            }).catch(error => console.error('Data belum ada atau error:', error));
    </script>
</body>
</html>
