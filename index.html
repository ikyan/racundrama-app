<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racun Drama VIP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Tema Gelap ala Netflix */
        body {
            background-color: #141414;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #000000;
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid #E50914;
            /* Garis merah Netflix */
        }

        h1 {
            margin: 0;
            font-size: 24px;
            color: #E50914;
        }

        .container {
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .card {
            background-color: #222;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.2s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .poster {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .info {
            padding: 10px;
        }

        .title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .episode {
            font-size: 12px;
            color: #aaa;
            margin-bottom: 10px;
        }

        .btn-nonton {
            background-color: #E50914;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }

        .btn-nonton:active {
            background-color: #b20710;
        }
    </style>
</head>

<body>

    <header>
        <h1>🎬 Racun Drama VIP</h1>
    </header>

    <div class="container">
        <div class="card">
            <img src="https://via.placeholder.com/150x200?text=Poster+Drama+1" alt="Poster" class="poster">
            <div class="info">
                <div class="title">Moving (2023)</div>
                <div class="episode">Full Episode 1-20</div>
                <button class="btn-nonton" onclick="bukaVideo('https://t.me/c/123456789/10')">Nonton HD</button>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/150x200?text=Poster+Drama+2" alt="Poster" class="poster">
            <div class="info">
                <div class="title">Vigilante</div>
                <div class="episode">Episode 1-8 (Tamat)</div>
                <button class="btn-nonton" onclick="bukaVideo('https://t.me/c/123456789/15')">Nonton HD</button>
            </div>
        </div>

    </div>

    <script>
        // Inisialisasi Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand(); // Biar aplikasinya buka full screen di HP

        // Fungsi buat buka link video langsung di dalam Telegram
        function bukaVideo(linkTelegram) {
            tg.openTelegramLink(linkTelegram);
        }
    </script>

</body>

</html>
